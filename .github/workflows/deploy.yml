name: Deploy to Production

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allow manual triggering

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        working-directory: .
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run basic syntax checks
        working-directory: .
        run: |
          python -m py_compile app/*.py
          python -m py_compile app/routers/*.py
          python -m py_compile app/services/*.py

      - name: Run tests (if available)
        working-directory: .
        continue-on-error: true
        run: |
          if [ -f "pytest.ini" ] || [ -f "test_*.py" ]; then
            pip install pytest
            pytest -v
          else
            echo "No pytest configuration found"
          fi

      - name: Build Docker image
        working-directory: .
        run: |
          docker build -t rhd-estimation-backend:${{ github.sha }} .
          docker build -t rhd-estimation-backend:latest .

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop_on_error: true
          script: |
            set -euo pipefail

            echo "Starting deployment..."
            echo "GitHub commit: ${{ github.sha }}"
            echo "Repository: ${{ github.repository }}"

            cd /opt/rhd-estimation/backend || exit 1

            # Load environment for DB_USER and DB_NAME
            source .env.prod

            # Pull latest code
            echo "Pulling latest changes..."
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}

            # Build new image
            echo "Building Docker image..."
            docker-compose -f docker-compose.prod.yml build --no-cache

            # Backup database
            echo "Creating database backup..."
            mkdir -p /opt/rhd-estimation/backups
            BACKUP_FILE="/opt/rhd-estimation/backups/backup-$(date +%Y%m%d-%H%M%S).sql"
            docker-compose -f docker-compose.prod.yml exec -T db pg_dump -U "$DB_USER" "$DB_NAME" > "$BACKUP_FILE" 2>/dev/null || echo "Backup skipped"

            # Stop old containers
            echo "Stopping containers..."
            docker-compose -f docker-compose.prod.yml down

            # Start new containers
            echo "Starting new containers..."
            docker-compose -f docker-compose.prod.yml up -d

            # Wait for services to be ready
            echo "Waiting for services..."
            sleep 10

            # Health checks
            echo "Running health checks..."
            for i in {1..30}; do
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "✓ Backend is healthy"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "✗ Backend health check failed"
                exit 1
              fi
              echo "Waiting for backend... ($i/30)"
              sleep 1
            done

            # Display status
            echo ""
            echo "Container status:"
            docker-compose -f docker-compose.prod.yml ps

            echo "✓ Deployment completed successfully"

      - name: Notify Slack on Success (Optional)
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "✅ RHD Estimation Backend deployed successfully",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *Deployment Successful*\n*Repository:* ${{ github.repository }}\n*Commit:* ${{ github.sha }}\n*Branch:* ${{ github.ref_name }}"
                  }
                }
              ]
            }
        continue-on-error: true

      - name: Notify Slack on Failure (Optional)
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "❌ RHD Estimation Backend deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Deployment Failed*\n*Repository:* ${{ github.repository }}\n*Commit:* ${{ github.sha }}\n*Branch:* ${{ github.ref_name }}\n*Check logs:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
        continue-on-error: true
