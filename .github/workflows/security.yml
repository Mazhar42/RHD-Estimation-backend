name: Security & Code Quality Checks

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  security-check:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Check for hardcoded secrets
        run: |
          echo "Checking for hardcoded secrets..."
          ! grep -r "SECRET_KEY.*=" backend/app/ --include="*.py" | grep -v "os.getenv\|os.environ"

      - name: Run Bandit (security linter)
        working-directory: .
        continue-on-error: true
        run: |
          bandit -r app/ -v

      - name: Check dependency vulnerabilities
        working-directory: .
        continue-on-error: true
        run: |
          safety check --json

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: .
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint black

      - name: Check code formatting with Black
        working-directory: .
        continue-on-error: true
        run: |
          black --check app/

      - name: Lint with flake8
        working-directory: .
        continue-on-error: true
        run: |
          flake8 app/ --max-line-length=120 --extend-ignore=E203,W503

      - name: Check with pylint
        working-directory: .
        continue-on-error: true
        run: |
          pylint app/ --disable=all --enable=E,F || true

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: rhd-estimation-backend:test
